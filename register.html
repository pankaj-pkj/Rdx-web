<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITENAME — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script>/* Theme init */if(localStorage.getItem("__sw_theme")==="light")document.body.classList.add("light-theme");if(localStorage.getItem("__sw_spring")==="off")document.body.classList.add("no-spring");</script>
<div class="auth-page">
  <div class="auth-glow"></div>
  <a href="index.html" class="auth-logo-link">
    <div class="logo-box"><span class="site-letter">M</span></div>
    <span class="site-name">My Website</span>
  </a>

  <div class="auth-box">
    <h2 class="auth-title">Create your account</h2>
    <p class="auth-subtitle">Already have an account? <a href="login.html">Sign in</a></p>

    <div class="auth-error" id="regErr"><span>⚠</span><span id="regErrMsg"></span></div>

    <div id="regForm">
      <label class="auth-label">Email Address</label>
      <input class="auth-input" type="email" id="regEmail" placeholder="you@example.com" oninput="validateEmail()">
      <div style="font-size:11px;color:#44445a;margin:-10px 0 14px" id="emailMsg"></div>

      <label class="auth-label">Username</label>
      <input class="auth-input" type="text" id="regUser" placeholder="johndoe" oninput="validateUser()">
      <div style="font-size:11px;color:#44445a;margin:-10px 0 14px" id="userMsg"></div>

      <label class="auth-label">Password</label>
      <div class="auth-input-wrap">
        <input class="auth-input" type="password" id="regPass" placeholder="Min. 8 characters" style="padding-right:42px" oninput="checkStrength()">
        <button type="button" class="auth-pw-toggle" onclick="togglePw('regPass',this)">👁</button>
      </div>
      <div class="pw-strength-bar">
        <div class="pw-seg" id="ps1"></div><div class="pw-seg" id="ps2"></div>
        <div class="pw-seg" id="ps3"></div><div class="pw-seg" id="ps4"></div>
      </div>
      <div style="font-size:11px;margin:4px 0 14px" id="pwHint"></div>

      <label class="auth-label">Confirm Password</label>
      <div class="auth-input-wrap">
        <input class="auth-input" type="password" id="regPass2" placeholder="Repeat password" style="padding-right:42px" oninput="checkConfirm()">
        <button type="button" class="auth-pw-toggle" onclick="togglePw('regPass2',this)">👁</button>
      </div>
      <div style="font-size:11px;color:#44445a;margin:-10px 0 14px" id="confirmMsg"></div>

      <label class="auth-label" style="margin-bottom:4px">Telegram <span style="font-weight:400;color:#44445a">(optional)</span></label>
      <input class="auth-input" type="text" id="regTG" placeholder="@username">

      <div style="display:flex;align-items:flex-start;gap:10px;margin:16px 0">
        <input type="checkbox" id="regTerms" style="accent-color:var(--acc);width:16px;height:16px;margin-top:2px;flex-shrink:0">
        <label for="regTerms" style="font-size:13px;color:#8888aa;cursor:pointer;line-height:1.5">
          I agree to the <a href="#" style="color:var(--acc)">Terms of Service</a> and <a href="#" style="color:var(--acc)">Privacy Policy</a>
        </label>
      </div>

      <button class="auth-submit" id="regBtn" onclick="submitRegister()">
        <div class="btn-spinner" id="regSpin"></div>
        <span id="regLabel">Create Account →</span>
      </button>
      <div class="auth-protect-note">🔒 Your data is encrypted and never shared</div>
    </div>

    <div class="form-success" id="regSuccess">
      <div class="success-icon">🎉</div>
      <h4>Account Created!</h4>
      <p>Welcome to <strong class="site-name">My Website</strong>.<br>Your account is ready to use.</p>
      <a href="pricing.html" class="auth-submit" style="margin-top:16px;display:flex;text-decoration:none">View Plans →</a>
    </div>
  </div>

  <p class="auth-footer-text">Already have an account? <a href="login.html">Login here</a></p>
</div>

<div id="toast" class="toast"></div>
<script src="security.js"></script>
<script src="main.js"></script>
<script>
if (Auth.isIn()) window.location.href = 'index.html';

function togglePw(id, btn) {
  const inp = typeof id === 'string' ? document.getElementById(id) : id;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function validateEmail() {
  const v = document.getElementById('regEmail').value.trim();
  const msg = document.getElementById('emailMsg');
  if (!v) { msg.textContent = ''; return; }
  const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  msg.style.color = ok ? 'var(--grn2)' : '#f87171';
  msg.textContent = ok ? '✓ Valid email' : '✗ Enter a valid email';
}

function validateUser() {
  const v = document.getElementById('regUser').value.trim();
  const msg = document.getElementById('userMsg');
  if (!v) { msg.textContent = ''; return; }
  const ok = /^[a-zA-Z0-9_]{3,20}$/.test(v);
  msg.style.color = ok ? 'var(--grn2)' : '#f87171';
  msg.textContent = ok ? '✓ Looks good!' : '✗ 3-20 chars, letters/numbers/underscore only';
}

function checkStrength() {
  const v = document.getElementById('regPass').value;
  const segs = [1,2,3,4].map(i => document.getElementById('ps'+i));
  const hint = document.getElementById('pwHint');
  segs.forEach(s => s.className = 'pw-seg');
  if (!v) { hint.textContent = ''; return; }
  let sc = 0;
  if (v.length >= 8)  sc++;
  if (v.length >= 12) sc++;
  if (/[A-Z]/.test(v) && /[0-9]/.test(v)) sc++;
  if (/[^A-Za-z0-9]/.test(v)) sc++;
  const cls = ['','weak','fair','good','strong'];
  const lbl = ['','Weak','Fair','Good','Strong'];
  const col = ['','#f87171','#fbbf24','#34d399','var(--grn2)'];
  for (let i = 0; i < sc; i++) segs[i].classList.add(cls[Math.min(sc,4)]);
  hint.style.color = col[Math.min(sc,4)];
  hint.textContent = lbl[Math.min(sc,4)];
}

function checkConfirm() {
  const p1 = document.getElementById('regPass').value;
  const p2 = document.getElementById('regPass2').value;
  const msg = document.getElementById('confirmMsg');
  if (!p2) { msg.textContent = ''; return; }
  const ok = p1 === p2;
  msg.style.color = ok ? 'var(--grn2)' : '#f87171';
  msg.textContent = ok ? '✓ Passwords match' : '✗ Passwords do not match';
}

function submitRegister() {
  const email = document.getElementById('regEmail').value.trim();
  const user  = document.getElementById('regUser').value.trim();
  const pass  = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  const tg    = document.getElementById('regTG').value.trim();
  const terms = document.getElementById('regTerms').checked;
  const errEl = document.getElementById('regErr');
  errEl.classList.remove('show');

  const showErr = msg => { document.getElementById('regErrMsg').textContent = msg; errEl.classList.add('show'); };

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('Enter a valid email address.'); return; }
  if (!user  || !/^[a-zA-Z0-9_]{3,20}$/.test(user))        { showErr('Invalid username format.'); return; }
  if (pass.length < 8)                                       { showErr('Password must be at least 8 characters.'); return; }
  if (pass !== pass2)                                        { showErr('Passwords do not match.'); return; }
  if (!terms)                                                { showErr('Please accept the Terms of Service.'); return; }

  const btn = document.getElementById('regBtn');
  document.getElementById('regSpin').style.display = 'inline-block';
  document.getElementById('regLabel').style.opacity = '.6';
  btn.disabled = true;

  setTimeout(() => {
    const uid = 'usr_' + Date.now();
    const data = { username: user, email, password: pass, telegram: tg, uid, created: new Date().toISOString() };
    localStorage.setItem('__sw_reg_' + user.toLowerCase(), JSON.stringify(data));
    localStorage.setItem('__sw_reg_' + email.toLowerCase(), JSON.stringify(data));
    Auth.save({ username: user, email, uid });

    document.getElementById('regForm').style.display = 'none';
    document.getElementById('regSuccess').style.display = 'block';
    showToast('Account created! 🎉', 'success');
  }, 1600);
}
</script>
</body>
</html>
