<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITENAME — Create Account</title>
<script>
  (function(){
    var t=localStorage.getItem('__sw_theme');
    var s=localStorage.getItem('__sw_spring');
    if(t==='light')document.documentElement.classList.add('light-theme');
    if(s==='off')  document.documentElement.classList.add('no-spring');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="auth-page-minimal">

  <!-- Logo -->
  <div class="auth-logo-top">
    <div class="auth-logo-top-box site-letter">M</div>
    <span class="auth-logo-top-name site-name">My Website</span>
  </div>

  <div class="auth-form-wrap">
    <h1 class="auth-heading">Create your account</h1>
    <p class="auth-sub">Already have an account? <a href="login.html">Sign in</a></p>

    <!-- Telegram button -->
    <button class="btn-telegram-full" onclick="telegramAuth()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/></svg>
      Continue with Telegram
    </button>

    <!-- OR -->
    <div class="or-row">OR</div>

    <!-- Error -->
    <div class="auth-error-dark" id="regErr">
      <span>⚠</span><span id="regErrMsg">Error</span>
    </div>

    <!-- Form -->
    <div id="regForm">
      <input class="input-dark-min" type="email" id="regEmail"
        placeholder="you@example.com" autocomplete="email" oninput="clearRegErr()">

      <input class="input-dark-min" type="text" id="regUser"
        placeholder="johndoe" autocomplete="username" oninput="clearRegErr()">

      <div class="input-wrap-min">
        <input class="input-dark-min" type="password" id="regPass"
          placeholder="Min 6 characters" oninput="clearRegErr()">
        <button type="button" class="pw-eye-min" onclick="togglePw('regPass',this)">👁</button>
      </div>

      <div class="input-wrap-min">
        <input class="input-dark-min" type="password" id="regPass2"
          placeholder="Confirm password" oninput="clearRegErr()">
        <button type="button" class="pw-eye-min" onclick="togglePw('regPass2',this)">👁</button>
      </div>

      <button class="btn-continue-dark" id="regBtn" onclick="submitRegister()">
        <div class="btn-spinner" id="regSpin"></div>
        <span id="regLabel">Continue →</span>
      </button>

      <p class="auth-terms">
        By continuing, you agree to our
        <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
      </p>
    </div>

    <!-- Success -->
    <div id="regSuccess" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:48px;margin-bottom:14px">🎉</div>
      <h3 style="font-family:var(--disp);font-size:22px;font-weight:800;color:#eeeeff;margin-bottom:8px">Account Created!</h3>
      <p style="font-size:14px;color:#8888aa;margin-bottom:20px">Welcome to <strong class="site-name">My Website</strong></p>
      <a href="pricing.html" class="btn-continue-dark" style="text-decoration:none">View Plans →</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="firebase-config.js"></script>
<script src="security.js"></script>
<script src="main.js"></script>
<script>
if(Auth.isIn()) window.location.href='index.html';

function clearRegErr(){document.getElementById('regErr').classList.remove('show');}
function showRegErr(msg){document.getElementById('regErrMsg').textContent=msg;document.getElementById('regErr').classList.add('show');}

function togglePw(id,btn){
  var inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'👁':'🙈';
}

function telegramAuth(){
  showToast('Telegram login coming soon!','success');
}

function setLoading(on){
  var btn=document.getElementById('regBtn');
  btn.disabled=on;
  document.getElementById('regSpin').style.display=on?'inline-block':'none';
  document.getElementById('regLabel').style.opacity=on?'.5':'1';
}

function submitRegister(){
  var email=document.getElementById('regEmail').value.trim();
  var user =document.getElementById('regUser').value.trim();
  var pass =document.getElementById('regPass').value;
  var pass2=document.getElementById('regPass2').value;
  clearRegErr();

  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showRegErr('Enter a valid email address.');return;}
  if(!user||user.length<3){showRegErr('Username must be at least 3 characters.');return;}
  if(pass.length<6){showRegErr('Password must be at least 6 characters.');return;}
  if(pass!==pass2){showRegErr('Passwords do not match.');return;}

  setLoading(true);

  if(window.__fbReady&&window.__auth){
    window.__auth.createUserWithEmailAndPassword(email,pass)
      .then(function(r){
        return r.user.updateProfile({displayName:user}).then(function(){
          if(window.__db){
            window.__db.collection('users').doc(r.user.uid).set({
              username:user,email:email,createdAt:firebase.firestore.FieldValue.serverTimestamp()
            }).catch(function(){});
          }
          Auth.save({uid:r.user.uid,email:email,username:user,firebase:true});
          onRegSuccess();
        });
      })
      .catch(function(err){
        setLoading(false);
        var m='Registration failed. Try again.';
        if(err.code==='auth/email-already-in-use') m='Email already registered. Try logging in.';
        if(err.code==='auth/weak-password')        m='Password is too weak.';
        showRegErr(m);
      });
  } else {
    setTimeout(function(){
      var uid='usr_'+Date.now();
      var d={username:user,email:email,password:pass,uid:uid,created:new Date().toISOString()};
      localStorage.setItem('__sw_reg_'+email.toLowerCase(),JSON.stringify(d));
      localStorage.setItem('__sw_reg_'+user.toLowerCase(),JSON.stringify(d));
      Auth.save({uid:uid,email:email,username:user});
      onRegSuccess();
    },1400);
  }
}

function onRegSuccess(){
  setLoading(false);
  document.getElementById('regForm').style.display='none';
  document.getElementById('regSuccess').style.display='block';
  showToast('Account created! 🎉','success');
}
</script>
</body>
</html>
