<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITENAME — Login</title>
<script>
  (function(){
    var t=localStorage.getItem('__sw_theme');
    var s=localStorage.getItem('__sw_spring');
    if(t==='light')document.documentElement.classList.add('light-theme');
    if(s==='off')  document.documentElement.classList.add('no-spring');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body style="background:#06060f;min-height:100vh">

<div class="auth-page-minimal">

  <!-- Logo -->
  <div class="auth-logo-top">
    <div class="auth-logo-top-box site-letter">M</div>
    <span class="auth-logo-top-name site-name">My Website</span>
  </div>

  <div class="auth-form-wrap">
    <h1 class="auth-heading">Welcome back</h1>
    <p class="auth-sub">Don't have an account? <a href="register.html">Sign up</a></p>

    <!-- Telegram -->
    <button class="btn-telegram-full" onclick="telegramLogin()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/></svg>
      Continue with Telegram
    </button>

    <div class="or-row">OR</div>

    <!-- Error -->
    <div class="auth-error-dark" id="loginErr">
      <span>⚠</span><span id="loginErrMsg">Error</span>
    </div>

    <div id="loginForm">
      <input class="input-dark-min" type="email" id="loginEmail"
        placeholder="you@example.com" autocomplete="email"
        oninput="clearErr()">

      <div style="display:flex;justify-content:flex-end;margin-bottom:5px">
        <a href="#" onclick="forgotPw(event)"
          style="font-size:12px;color:#8888aa;transition:color .2s"
          onmouseover="this.style.color='var(--acc)'"
          onmouseout="this.style.color='#8888aa'">Forgot password?</a>
      </div>
      <div class="input-wrap-min">
        <input class="input-dark-min" type="password" id="loginPass"
          placeholder="Your password" autocomplete="current-password"
          oninput="clearErr()">
        <button type="button" class="pw-eye-min" onclick="togglePw()">👁</button>
      </div>

      <button class="btn-continue-dark" id="loginBtn" onclick="submitLogin()">
        <div class="btn-spinner" id="loginSpin"></div>
        <span id="loginLabel">Continue →</span>
      </button>

      <p class="auth-terms">
        By continuing, you agree to our
        <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
      </p>
    </div>

    <div id="loginSuccess" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:48px;margin-bottom:14px">✅</div>
      <h3 style="font-family:var(--disp);font-size:22px;font-weight:800;color:#eeeeff;margin-bottom:8px">Login Successful!</h3>
      <p style="font-size:14px;color:#8888aa">Welcome back to <strong class="site-name">My Website</strong></p>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="firebase-config.js"></script>
<script src="security.js"></script>
<script src="main.js"></script>
<script>
if(Auth.isIn()){
  var red=new URLSearchParams(window.location.search).get('redirect')||'index.html';
  window.location.href=red;
}

function clearErr(){document.getElementById('loginErr').classList.remove('show');}
function showErr(m){document.getElementById('loginErrMsg').textContent=m;document.getElementById('loginErr').classList.add('show');}

function togglePw(){
  var i=document.getElementById('loginPass');
  var b=document.querySelector('.pw-eye-min');
  i.type=i.type==='password'?'text':'password';
  b.textContent=i.type==='password'?'👁':'🙈';
}

function telegramLogin(){ showToast('Telegram login coming soon!','success'); }

function forgotPw(e){
  e.preventDefault();
  var email=document.getElementById('loginEmail').value.trim();
  if(!email){showErr('Enter your email first.');return;}
  if(window.__fbReady&&window.__auth){
    window.__auth.sendPasswordResetEmail(email)
      .then(()=>showToast('Reset email sent to '+email,'success'))
      .catch(err=>showToast(err.message,'error'));
  } else {
    showToast('Reset link sent (demo mode)','success');
  }
}

function setLoad(on){
  document.getElementById('loginBtn').disabled=on;
  document.getElementById('loginSpin').style.display=on?'inline-block':'none';
  document.getElementById('loginLabel').style.opacity=on?'.5':'1';
}

function submitLogin(){
  var email=document.getElementById('loginEmail').value.trim();
  var pass =document.getElementById('loginPass').value;
  clearErr();
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showErr('Enter a valid email address.');return;}
  if(!pass||pass.length<6){showErr('Password must be at least 6 characters.');return;}
  setLoad(true);

  if(window.__fbReady&&window.__auth){
    window.__auth.signInWithEmailAndPassword(email,pass)
      .then(r=>{
        Auth.save({uid:r.user.uid,email:r.user.email,username:r.user.displayName||r.user.email.split('@')[0],firebase:true});
        onSuccess();
      })
      .catch(err=>{
        setLoad(false);
        var m='Login failed.';
        if(err.code==='auth/user-not-found')   m='No account with this email.';
        if(err.code==='auth/wrong-password')   m='Incorrect password.';
        if(err.code==='auth/invalid-credential') m='Invalid email or password.';
        if(err.code==='auth/too-many-requests') m='Too many attempts. Try later.';
        showErr(m);
      });
  } else {
    setTimeout(()=>{
      var stored=localStorage.getItem('__sw_reg_'+email.toLowerCase());
      if(stored){
        var reg=JSON.parse(stored);
        if(reg.password!==pass){setLoad(false);showErr('Incorrect password.');return;}
        Auth.save({uid:reg.uid,email:reg.email,username:reg.username});
      } else {
        Auth.save({uid:'demo_'+Date.now(),email:email,username:email.split('@')[0]});
      }
      onSuccess();
    },1200);
  }
}

function onSuccess(){
  setLoad(false);
  document.getElementById('loginForm').style.display='none';
  document.getElementById('loginSuccess').style.display='block';
  showToast('Logged in! 🎉','success');
  var red=new URLSearchParams(window.location.search).get('redirect')||'index.html';
  setTimeout(()=>window.location.href=red,1600);
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')submitLogin();});
</script>
</body>
</html>
